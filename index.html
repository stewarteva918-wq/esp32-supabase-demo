<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Данные с ESP32</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>📊 Данные с ESP32</h1>
        <div class="status" id="connectionStatus">Загрузка...</div>
        
        <div class="data-card" id="latestData">
            Загрузка...
        </div>

        <div class="data-card">
            <h2>📈 График газа (PPM)</h2>
            <div style="height: 300px;">
                <canvas id="gasChart"></canvas>
            </div>
        </div>

        <div class="data-card">
            <h2>📋 История измерений</h2>
            <div id="historyTable">
                Загрузка истории...
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
